name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  recall:
    name: Recall (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # Retrieval-quality signal over the code-context corpus itself. Local
      # embedder, no API key. Report-only: prints hit@5 / MRR@5 to the log and
      # never fails the build (a soft floor can come later once stable).
      - name: Recall report
        run: node bench/recall.mjs
