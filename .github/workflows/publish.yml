name: Publish (npm + MCP Registry)

# Publishes in two stages:
#   1. npm - @infino-ai/code-context to the public npm registry.
#   2. MCP Registry - the server metadata (server.json) to
#      registry.modelcontextprotocol.io, which propagates to downstream
#      catalogs. The registry hosts only metadata and verifies ownership of
#      the npm package via the "mcpName" field in package.json, so npm must
#      publish first.
#
# npm auth is the classic NPM_TOKEN secret (publish rights under the infino-ai
# org). Provenance - the "built from this repo at this commit" attestation on
# npmjs.org - is emitted via NPM_CONFIG_PROVENANCE + the OIDC id-token
# (requires a public source repo). MCP Registry auth is GitHub OIDC - no
# secret; the id-token from this repo authorizes the io.github.infino-ai/*
# namespace.
#
# Releases drive publishing: create a GitHub release with tag vX.Y.Z
# (matching package.json) and this workflow publishes to npm and the MCP
# Registry automatically. Manual dispatch stays available as a dry run for
# validating the pipeline without publishing anything.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only - build + pack, publish nothing"
        type: boolean
        default: true

permissions:
  id-token: write # OIDC token for npm provenance
  contents: read

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A release tag must match the version it ships, or the npm version,
      # the git tag, and the registry entry drift apart.
      - name: Check tag matches package.json version
        if: ${{ github.event_name == 'release' }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "v$VERSION" ]; then
            echo "release tag $TAG does not match package.json version v$VERSION" >&2
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

      # --- stage 1: npm ---
      - name: Validate (dry run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --tag latest --access public
      # Idempotent: skip if this version is already on npm, so a re-run
      # doesn't fail on "cannot publish over existing version".
      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@infino-ai/code-context@$VERSION" version >/dev/null 2>&1; then
            echo "version $VERSION already published - skipping"
          # npm's read API lags a brand-new scoped package by minutes, so the
          # `npm view` check above can 404 even when the version already exists.
          # Tolerate the resulting "cannot publish over" conflict so a re-run
          # (e.g. to finish the MCP Registry stage) is not blocked on that lag.
          elif npm publish --tag latest --access public 2>publish.err; then
            cat publish.err >&2 || true
          else
            cat publish.err >&2
            grep -q "cannot publish over" publish.err \
              && echo "version $VERSION already published (read-API lag) - continuing" \
              || exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # --- stage 2: MCP Registry ---
      # Keep server.json's versions in lockstep with the package version so
      # the registry entry always points at the version just published to npm.
      - name: Sync server.json version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Validate server.json (dry run)
        if: ${{ inputs.dry_run }}
        run: ./mcp-publisher validate
      - name: Authenticate to MCP Registry (GitHub OIDC)
        if: ${{ !inputs.dry_run }}
        run: ./mcp-publisher login github-oidc
      # Idempotent: the registry rejects re-publishing an existing version,
      # so skip if this version is already listed.
      - name: Publish to MCP Registry
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./server.json').version")
          NAME_ENC=$(node -p "encodeURIComponent(require('./server.json').name)")
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://registry.modelcontextprotocol.io/v0.1/servers/${NAME_ENC}/versions/${VERSION}")
          if [ "$CODE" = "200" ]; then
            echo "version $VERSION already in the registry - skipping"
          else
            ./mcp-publisher publish
          fi
